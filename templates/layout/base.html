{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#004c54">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gametime">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{{.Title}} | Philly Gametime</title>
  <link rel="manifest" href="/static/site.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <script>
    {{if .ShowThemePicker}}
      document.documentElement.dataset.theme = localStorage.getItem('phillyGametimeTheme') || 'neon';
    {{else}}
      document.documentElement.dataset.theme = 'neon';
    {{end}}
  </script>
  <link rel="stylesheet" href="/static/css/style.css?v=20260527-schedule-mobile-row">
</head>
<body>
  {{template "header" .}}

  <main class="container">
    {{template "content" .}}
  </main>

  {{template "footer" .}}
  <script src="/static/js/app.js?v=20260527-schedule-mobile-row"></script>
</body>
</html>
{{end}}
