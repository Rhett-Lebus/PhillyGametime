{{define "header"}}
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="Philly Gametime home">
      <span class="logo-mark" aria-hidden="true">
        <img src="/static/icons/philly-gametime-logo.svg" alt="">
      </span>
      <span class="logo-text">PHILLY <strong>GAMETIME</strong></span>
    </a>

    <a href="/world-cup" class="world-cup-promo {{if eq .NavActive "world-cup"}}active{{end}}" aria-label="World Cup special">
      <span class="world-cup-promo__icon" aria-hidden="true">
        <img src="https://a.espncdn.com/i/leaguelogos/soccer/500/4.png" alt="">
      </span>
      <span class="world-cup-promo__label" aria-hidden="true">World Cup</span>
    </a>

    <nav class="main-nav" aria-label="Primary">
      <a href="/" class="nav-link {{if eq .NavActive "home"}}active{{end}}">Home</a>
      <a href="/scores" class="nav-link {{if eq .NavActive "scores"}}active{{end}}">Live Scores</a>
      <a href="/upcoming" class="nav-link {{if eq .NavActive "upcoming"}}active{{end}}">Upcoming</a>
      <a href="/schedule" class="nav-link {{if eq .NavActive "schedule"}}active{{end}}">Schedule</a>
      <a href="/teams" class="nav-link {{if eq .NavActive "teams"}}active{{end}}">Teams</a>
      <a href="/stats" class="nav-link {{if eq .NavActive "stats"}}active{{end}}">Stats</a>
      <a href="/tv" class="nav-link {{if eq .NavActive "tv"}}active{{end}}">TV / Stream</a>
    </nav>

    <nav class="team-quick-pick" aria-label="Team quick links">
      <a href="/teams/eagles" style="--team-color:#004C54" aria-label="Eagles"><img src="https://a.espncdn.com/i/teamlogos/nfl/500/phi.png" alt=""></a>
      <a href="/teams/flyers" style="--team-color:#F74902" aria-label="Flyers"><img src="https://a.espncdn.com/i/teamlogos/nhl/500/phi.png" alt=""></a>
      <a href="/teams/phillies" style="--team-color:#E81828" aria-label="Phillies"><img src="https://a.espncdn.com/i/teamlogos/mlb/500/phi.png" alt=""></a>
      <a href="/teams/sixers" style="--team-color:#006BB6" aria-label="76ers"><img src="https://a.espncdn.com/i/teamlogos/nba/500/phi.png" alt=""></a>
      <a href="/teams/union" style="--team-color:#071B2C" aria-label="Union"><img src="https://a.espncdn.com/i/teamlogos/soccer/500/10739.png" alt=""></a>
    </nav>

    {{if .ShowThemePicker}}
      <label class="theme-picker" aria-label="Theme">
        <span>Theme</span>
        <select id="theme-select">
          <option value="basic">Basic</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="midnight">Midnight</option>
          <option value="neon">Neon Logo</option>
          <option value="neon-electric">Neon Electric</option>
          <option value="neon-night">Neon Night</option>
        </select>
      </label>
    {{end}}
  </div>
</header>
{{end}}
