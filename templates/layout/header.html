{{define "header"}}
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="Philly Gametime home">
      <span class="logo-mark" aria-hidden="true">
        <img src="/static/icons/philly-gametime-logo.svg" alt="">
      </span>
      <span class="logo-text">PHILLY <strong>GAMETIME</strong></span>
    </a>

    <nav class="main-nav" aria-label="Primary">
      <a href="/" class="nav-link {{if eq .NavActive "home"}}active{{end}}">Home</a>
      <a href="/scores" class="nav-link {{if eq .NavActive "scores"}}active{{end}}">Live Scores</a>
      <a href="/upcoming" class="nav-link {{if eq .NavActive "upcoming"}}active{{end}}">Upcoming</a>
      <a href="/teams" class="nav-link {{if eq .NavActive "teams"}}active{{end}}">Teams</a>
      <a href="/stats" class="nav-link {{if eq .NavActive "stats"}}active{{end}}">Stats</a>
      <a href="/tv" class="nav-link {{if eq .NavActive "tv"}}active{{end}}">TV / Stream</a>
    </nav>

    <form class="search-form" action="/scores" method="get">
      <input type="search" name="q" placeholder="Search teams" class="search-input" aria-label="Search teams">
      <button type="submit" class="icon-button" aria-label="Search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
      </button>
    </form>

    {{if .ShowThemePicker}}
      <label class="theme-picker" aria-label="Theme">
        <span>Theme</span>
        <select id="theme-select">
          <option value="basic">Basic</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="midnight">Midnight</option>
          <option value="neon">Neon Logo</option>
          <option value="neon-electric">Neon Electric</option>
          <option value="neon-night">Neon Night</option>
        </select>
      </label>
    {{end}}
  </div>
</header>
{{end}}
